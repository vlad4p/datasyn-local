# datasyn-local configuration
# Override paths with environment variables (see .env.example)

database:
  path: data/duckdb/datasyn.duckdb
  schema: main

paths:
  landing: data/landing
  reports: reports
  logs: .logs
  src: src

ingest:
  csv_auto_detect: true
  json_format: auto

mcp:
  enabled: true
  transport: stdio
  log_level: info

logging:
  format: jsonl
  # Daily files: .logs/traces_YYYYMMDD.jsonl
