<?xml version="1.0" encoding="UTF-8"?>
<svg style="background-color:#fffceb" xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560" role="img" aria-label="How a plain-language request becomes an auditable answer">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#395a8e"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#fffceb"/>
  <text x="280" y="36" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="bold" fill="#49443b" letter-spacing="1">HOW ONE REQUEST WORKS</text>

  <!-- 1 You ask -->
  <g transform="translate(80,60)">
    <rect width="400" height="66" rx="6" fill="#ffffff" stroke="#395a8e" stroke-width="2.5"/>
    <circle cx="40" cy="33" r="20" fill="#395a8e"/>
    <text x="40" y="39" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fffceb">1</text>
    <text x="74" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#49443b">&#128172; You ask in plain language</text>
    <text x="74" y="50" font-family="Arial,sans-serif" font-size="10.5" fill="#7e7f7e">"Ingest this CSV and summarize it"</text>
  </g>
  <line x1="280" y1="126" x2="280" y2="150" stroke="#395a8e" stroke-width="3" stroke-linecap="round" marker-end="url(#a2)"/>

  <!-- 2 assistant reads AGENTS + skill -->
  <g transform="translate(80,150)">
    <rect width="400" height="66" rx="6" fill="#0e2d58" stroke="#49443b" stroke-width="2.5"/>
    <circle cx="40" cy="33" r="20" fill="#fffceb"/>
    <text x="40" y="39" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0e2d58">2</text>
    <text x="74" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fffceb">&#129302; Assistant reads AGENTS.md</text>
    <text x="74" y="50" font-family="Arial,sans-serif" font-size="10.5" fill="#b3c8cd">picks a skill: ingest-data, statistical-report, &#8230;</text>
  </g>
  <line x1="280" y1="216" x2="280" y2="240" stroke="#395a8e" stroke-width="3" stroke-linecap="round" marker-end="url(#a2)"/>

  <!-- 3 SQL via MCP -->
  <g transform="translate(80,240)">
    <rect width="400" height="66" rx="6" fill="#ffffff" stroke="#559778" stroke-width="2.5"/>
    <circle cx="40" cy="33" r="20" fill="#559778"/>
    <text x="40" y="39" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fffceb">3</text>
    <text x="74" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#49443b">&#128451;&#65039; Runs SQL on DuckDB via MCP</text>
    <text x="74" y="50" font-family="Arial,sans-serif" font-size="10.5" fill="#7e7f7e">duckdb_mcp &#183; scripts/python/db.py</text>
  </g>
  <line x1="280" y1="306" x2="280" y2="330" stroke="#559778" stroke-width="3" stroke-linecap="round" marker-end="url(#a2)"/>

  <!-- 4 report -->
  <g transform="translate(80,330)">
    <rect width="400" height="66" rx="6" fill="#ffffff" stroke="#de6433" stroke-width="2.5"/>
    <circle cx="40" cy="33" r="20" fill="#de6433"/>
    <text x="40" y="39" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fffceb">4</text>
    <text x="74" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#49443b">&#128202; Writes a report to reports/</text>
    <text x="74" y="50" font-family="Arial,sans-serif" font-size="10.5" fill="#7e7f7e">markdown / JSON / HTML</text>
  </g>
  <line x1="280" y1="396" x2="280" y2="420" stroke="#559778" stroke-width="3" stroke-linecap="round" marker-end="url(#a2)"/>

  <!-- 5 auditable answer -->
  <g transform="translate(80,420)">
    <rect width="400" height="80" rx="6" fill="#559778" stroke="#49443b" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="20" fill="#fffceb"/>
    <path d="M31,40 L38,47 L51,32" fill="none" stroke="#559778" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="74" y="34" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fffceb">&#9989; Auditable answer</text>
    <text x="74" y="54" font-family="Arial,sans-serif" font-size="10.5" fill="#e6f0df">what the data shows &#183; how we know</text>
    <text x="74" y="70" font-family="Arial,sans-serif" font-size="10.5" fill="#e6f0df">the SQL used &#183; the limits</text>
  </g>

  <text x="280" y="534" text-anchor="middle" font-family="Arial,sans-serif" font-size="10.5" fill="#7e7f7e">Journalist mindset: provenance, method, evidence, limits</text>
</svg>
